<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>¡pues!</title>
<meta name="description" content="¡pues! Osobní aplikace na učení španělštiny — denní zprávy s překladem a audiem.">
<meta name="theme-color" content="#C60B1E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="¡pues!">
<script>
(function(){var s=null;try{s=localStorage.getItem('pues-theme')}catch(e){}
var d=(s==='light'||s==='dark')?s:(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
document.documentElement.dataset.theme=d;
var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=d==='dark'?'#191412':'#C60B1E';})();
</script>
<link rel="stylesheet" href="style.css">
<script>const APP_VERSION = '3.00';</script>
</head>
<body>
<div id="ptr" class="ptr hidden">↓ přetáhni pro obnovení</div>
<div class="bandera"></div>

<header>
  <h1><a href="./" title="Na úvod"><span class="marca">¡</span>pues<span class="marca">!</span></a></h1>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Přepnout na tmavý režim">
    <svg class="ic-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    <svg class="ic-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</header>

<div id="update-banner" class="update-banner hidden">
  <span id="update-text">Je k dispozici nová verze</span>
  <button id="update-btn">Obnovit</button>
</div>

<p id="voice-note" class="muted hidden" style="text-align:center;margin:0 16px 10px">Přehrávání zní jinak — tomuto zařízení chybí španělský hlas; doplň ho v nastavení čtení textu nebo zkus jiné zařízení.</p>

<main id="main"></main>

<footer class="site-footer">
  <img src="icon.svg" alt="" class="footer-logo"><span>¡pues! <span id="footer-version"></span></span>
</footer>

<div id="player" class="player hidden">
  <button class="pl-play" id="pl-play" aria-label="Přehrát nebo pozastavit">
    <svg id="pl-ic-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="4.5" height="14" rx="1.2"/><rect x="13.5" y="5" width="4.5" height="14" rx="1.2"/></svg>
    <svg id="pl-ic-play" class="hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13a1 1 0 0 0 1.53.85l10-6.5a1 1 0 0 0 0-1.7l-10-6.5A1 1 0 0 0 8 5.5z"/></svg>
  </button>
  <button id="pl-next" aria-label="Další věta">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5.5v13a1 1 0 0 0 1.53.85l8.2-5.33V18a1 1 0 0 0 2 0V6a1 1 0 0 0-2 0v3.98L7.53 4.65A1 1 0 0 0 6 5.5z"/></svg>
  </button>
  <span class="pl-label" id="pl-label"></span>
  <button class="pl-rate" id="pl-rate" aria-label="Rychlost čtení">0.85×</button>
  <button id="pl-stop" aria-label="Zavřít přehrávač">
    <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11"/></svg>
  </button>
</div>

<button id="to-top" class="to-top hidden" aria-label="Zpět nahoru">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 14.5l6-6 6 6"/></svg>
</button>

<script src="app.js"></script>
</body>
</html>
